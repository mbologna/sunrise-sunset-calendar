name: CI

"on":
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  test:
    name: Test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        php-version: ["8.5"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-
            ${{ runner.os }}-php-
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, json
          coverage: none
          tools: composer
      - run: composer validate --strict
      - run: composer install --prefer-dist --no-progress --no-interaction
      - name: Validate PHP syntax
        run: |
          php -l sunrise-sunset-calendar.php
          php -l src/calendar-generator.php
      - name: Create test config
        run: |
          mkdir -p config
          echo '<?php define("AUTH_TOKEN", "test-token-for-ci"); ?>' > config/config.php
      - run: ./vendor/bin/phpunit --testdox

  lint:
    uses: mbologna/.github/.github/workflows/php-ci.yml@eeab720b08ce458869bd18ad8a33cd50e9fb82bf # main
    with:
      php_version: "8.5"
      enable_test: false
      enable_lint: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.5"
      - name: Check for security vulnerabilities
        run: |
          ! grep -r "eval(" --include="*.php" .
          ! grep -r "system(" --include="*.php" .
          ! grep -r "exec(" --include="*.php" . || grep -r "// Security checked" --include="*.php" .
          ! grep -r "\$_REQUEST" --include="*.php" .

  docker:
    needs: [test, lint]
    uses: mbologna/.github/.github/workflows/docker-ci.yml@eeab720b08ce458869bd18ad8a33cd50e9fb82bf # main
    with:
      image_name: sunrise-sunset-calendar
      push_to_dockerhub: true
      enable_grype: true
      enable_cosign: true
      enable_release_drafter: true
    secrets: inherit

  auto-release:
    if: github.event_name == 'schedule'
    needs: [docker]
    uses: mbologna/.github/.github/workflows/auto-release.yml@eeab720b08ce458869bd18ad8a33cd50e9fb82bf # main
    with:
      strategy: docker
      image: docker.io/mbologna/sunrise-sunset-calendar
    secrets: inherit

  deploy:
    needs: [docker]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/gcp-deploy.yml@eeab720b08ce458869bd18ad8a33cd50e9fb82bf # main
    with:
      image_name: sunrise-sunset-calendar
      deploy_type: service
      deploy_name: sunrise-sunset-calendar
      region: us-central1
    secrets: inherit
