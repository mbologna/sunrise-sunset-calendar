name: CI

"on":
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  test:
    uses: mbologna/.github/.github/workflows/php-ci.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      php_version: "8.5"
      php_extensions: "mbstring, json"
      enable_test: true
      enable_composer_cache: true
      pre_test_command: "mkdir -p config && echo '<?php define(\"AUTH_TOKEN\", \"test-token-for-ci\"); ?>' > config/config.php"
      test_command: vendor/bin/phpunit --testdox

  lint:
    uses: mbologna/.github/.github/workflows/php-ci.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      php_version: "8.5"
      enable_test: false
      enable_lint: true
      lint_tools: ""
      lint_command: >-
        php -l sunrise-sunset-calendar.php &&
        php -l src/calendar-generator.php &&
        ! grep -r "eval(" --include="*.php" . &&
        ! grep -r "system(" --include="*.php" . &&
        (! grep -r "exec(" --include="*.php" . || grep -r "// Security checked" --include="*.php" .) &&
        ! grep -r "\$_REQUEST" --include="*.php" .

  docker:
    needs: [test, lint]
    uses: mbologna/.github/.github/workflows/docker-ci.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      image_name: sunrise-sunset-calendar
      push_to_dockerhub: true
      enable_cosign: true
      enable_release_drafter: true
    secrets: inherit

  auto-release:
    if: github.event_name == 'schedule'
    needs: [docker]
    uses: mbologna/.github/.github/workflows/auto-release.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      strategy: docker
      image: docker.io/mbologna/sunrise-sunset-calendar
    secrets: inherit

  deploy:
    needs: [docker]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/gcp-deploy.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      image_name: sunrise-sunset-calendar
      deploy_type: service
      deploy_name: sunrise-sunset-calendar
      region: us-central1
    secrets: inherit

  cache-cleanup:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/cache-cleanup.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      max_age_days: 7
    permissions:
      actions: write
